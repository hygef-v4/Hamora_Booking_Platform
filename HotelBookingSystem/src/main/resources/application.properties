spring.application.name=HotelBookingSystem
server.port=${SERVER_PORT:8386}

# Base URL configuration
app.base-url=${APP_BASE_URL:http://localhost:8386}

# ========================
# Database Configuration
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Local fallback (uncomment if needed)
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=RoomBooking;encrypt=false;trustServerCertificate=true
# spring.datasource.username=sa
# spring.datasource.password=123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========================
# Multipart & Thymeleaf
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
server.error.whitelabel.enabled=false

# ========================
# OAuth2 - Google
# ========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ========================
# Gmail SMTP
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================
# Cloudinary Storage
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ========================
# WebSocket / Logging
# ========================
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.swp391.hotelbookingsystem.controller.chat=DEBUG

# Giảm mức log của openhtmltopdf
logging.level.org.xhtmlrenderer=OFF
logging.level.com.openhtmltopdf=OFF
logging.level.com.openhtmltopdf.render=OFF
logging.level.com.openhtmltopdf.load=OFF
logging.level.com.openhtmltopdf.css-parse=OFF
